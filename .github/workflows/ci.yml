name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install black ruff pytest pytest-cov mypy
        
    - name: Lint with Ruff & Black
      run: |
        black --check backend/
        ruff check backend/
        
    - name: Type check
      run: |
        mypy backend/ --strict || true
        
    - name: Test
      env:
        JWT_SECRET: ci-test-secret-not-for-production
        DATABASE_URL: sqlite:///./test.db
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: "60"
        REFRESH_TOKEN_EXPIRE_DAYS: "7"
      run: |
        cd backend && pytest
